<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目管理工具</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        screens: {
          xs: '490px',
          sm: '768px',
          md: '1024px',
          lg: '1200px',
          xl: '1366px',
        }
      }
    }
  </script>
</head>
<body>
  <div class="header">
    <div class="flex items-center justify-between w-full gap-2 max-w-[1360px] mx-auto">
      <div class="flex items-center gap-4 lg:hidden">
        <button class="menu-toggle" onclick="toggleSidebar()" id="menuToggle">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><!-- Icon from Material Symbols by Google - https://github.com/google/material-design-icons/blob/master/LICENSE --><path fill="currentColor" d="M4 18q-.425 0-.712-.288T3 17t.288-.712T4 16h16q.425 0 .713.288T21 17t-.288.713T20 18zm0-5q-.425 0-.712-.288T3 12t.288-.712T4 11h16q.425 0 .713.288T21 12t-.288.713T20 13zm0-5q-.425 0-.712-.288T3 7t.288-.712T4 6h16q.425 0 .713.288T21 7t-.288.713T20 8z"/></svg>
        </button>
      </div>
      <div class="text-center md:text-left w-full flex-1">
        <h1>项目管理工具</h1>
        <p>简化开发流程，一键启动项目</p>
      </div>
      <div class="theme-toggle-container">
        <button class="theme-toggle hover:scale-110 transition-transform duration-300" onclick="toggleTheme()" id="themeToggle">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><!-- Icon from Material Symbols by Google - https://github.com/google/material-design-icons/blob/master/LICENSE --><path fill="currentColor" d="M12 21q-3.75 0-6.375-2.625T3 12t2.625-6.375T12 3q.35 0 .688.025t.662.075q-1.025.725-1.638 1.888T11.1 7.5q0 2.25 1.575 3.825T16.5 12.9q1.375 0 2.525-.613T20.9 10.65q.05.325.075.662T21 12q0 3.75-2.625 6.375T12 21"/></svg>
        </button>
      </div>
      <button class="settings-btn" onclick="toggleSettingsPanel()" id="settingsBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
    <div class="settings-overlay backdrop-blur-sm" id="settingsOverlay" onclick="toggleSettingsPanel()"></div>
    <div class="settings-panel backdrop-blur-md" id="settingsPanel">
        <div class="settings-header">
          <h3>设置</h3>
          <button class="settings-close" onclick="toggleSettingsPanel()">&times;</button>
        </div>
        <div class="settings-body">
          <div class="setting-section">
            <h4>主题色</h4>
            <div class="color-options-setting">
              <div class="color-option-setting" style="background: #667eea;" data-color="#667eea" title="薰衣草紫"></div>
              <div class="color-option-setting" style="background: #ff9900;" data-color="#ff9900" title="琥珀橙"></div>
              <div class="color-option-setting" style="background: #10b981;" data-color="#10b981" title="翡翠绿"></div>
              <div class="color-option-setting" style="background: #0ea5e9;" data-color="#0ea5e9" title="天空蓝"></div>
              <div class="color-option-setting" style="background: #ef4444;" data-color="#ef4444" title="珊瑚红"></div>
              <div class="color-option-setting" style="background: #f1be03;" data-color="#f1be03" title="琥珀金"></div>
              <input type="color" class="custom-color-picker" id="customThemeColor" onchange="setCustomThemeColor()">
            </div>
          </div>
          <div class="setting-section">
            <h4>字体设置</h4>
            <div class="font-settings">
              <div class="font-setting-item">
                <label>字体</label>
                <select id="fontFamilySelect" onchange="setFontFamily()">
                  <option value="PingFang SC">默认</option>
                  <option value="Microsoft YaHei">微软雅黑</option>
                  <!-- <option value="Black">黑体</option>
                  <option value="OPPOSans">OPPO</option> -->
                  <option value="cursive">宋体</option>
                  <option value="serif">楷体</option>
                </select>
              </div>
              <div class="font-setting-item">
                <label>字体大小</label>
                <select id="fontSizeSelect" onchange="setFontSize()">
                  <option value="12px">12px</option>
                  <option value="14px">14px</option>
                  <option value="16px">16px</option>
                  <option value="18px">18px</option>
                </select>
              </div>
            </div>
          </div>
          <div class="setting-section">
            <h4>背景设置</h4>
            <div class="background-preview" id="backgroundPreview" onclick="openWallpaperModal()">
              <div class="preview-image" id="previewImage" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&h=800&fit=crop');">
                <div class="preview-overlay">
                  <span class="preview-icon">🖼️</span>
                  <span class="preview-text">点击更换壁纸</span>
                </div>
              </div>
            </div>
            <div class="background-color-options">
              <div class="bg-color-option" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" data-bg="gradient1"></div>
              <div class="bg-color-option" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" data-bg="gradient2"></div>
              <div class="bg-color-option" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);" data-bg="gradient3"></div>
              <div class="bg-color-option" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);" data-bg="gradient4"></div>
              <div class="bg-color-option" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);" data-bg="gradient5"></div>
              <div class="bg-color-option" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);" data-bg="gradient6"></div>
              <input type="color" class="custom-bg-color-picker" id="customBgColor" onchange="setCustomBackgroundColor()">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="sidebar-overlay backdrop-blur-sm" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <div class="main-content my-4 gap-4 sticky top-4">
    <div class="content-area">
      <div class="operation flex-col mb-4 md:flex-row max-w-[1400px] mx-auto">
        <div class="actions grid items-center grid-cols-3 xs:flex text-center">
            <button class="btn btn-primary justify-center" onclick="openImportModal()">
              <span>+</span> 导入项目
            </button>
            <button class="btn btn-info justify-center" onclick="openGitImportModal()">
              <span>🔗</span> Git 导入
            </button>
            <button class="btn btn-success justify-center" onclick="openScanModal()">
              <span>📁</span> 批量扫描
            </button>
            <button class="btn btn-danger justify-center hidden xs:block batch-delete-desktop" onclick="batchDelete()" id="batchDeleteBtnDesktop" disabled>
                <span>🗑️</span> 批量删除
            </button>
        </div>
        <div class="flex filter-box items-center justify-between gap-3 w-full">
          <select id="statusFilter">
            <option value="all">全部状态</option>
            <option value="running">运行中</option>
            <option value="starting">启动中</option>
            <option value="stopped">已停止</option>
          </select>
          <input type="text" class="search-box" id="searchInput" placeholder="搜索项目..." oninput="filterProjects()">
        </div>
      </div>
      <div class="card backdrop-blur-md shadow-xl">
        <div class="card-header" style="display: flex;">
          <div class="flex items-center justify-between flex-1">
            <div class="flex items-center gap-2">
              <label class="custom-checkbox">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                <span class="checkbox-checkmark"></span>
                <span class="checkbox-label">全选</span>
              </label>
              <h2 id="currentGroupTitle">全部项目
                <span class="group-count xs:hidden" id="allCount">0</span>
              </h2>
            </div>
            <button class="btn btn-danger btn-sm batch-delete-mobile xs:hidden" onclick="batchDelete()" id="batchDeleteBtnMobile" disabled>
              <span>🗑️</span> 删除
            </button>
          </div>
          <div class="xs:flex items-center gap-4 hidden">
            <span id="projectCount" style="color: #6b7280; font-size: 14px;flex:1;">共 0 个项目</span>
          </div>
        </div>
        <div class="card-body card-body-relative">
          <div id="projectList" class="project-list">
            <div class="empty-state">
              <div class="icon">📋</div>
              <h3>暂无项目</h3>
              <p>点击上方按钮导入或扫描项目</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="sidebar">
      <div class="sidebar-card backdrop-blur-md shadow-xl">
        <div class="sidebar-header">
          <h3>分组管理</h3>
        </div>
        <div class="sidebar-body">
          <ul class="group-list" id="groupList">
            <li class="group-item active" onclick="selectGroup('全部')">
              <span class="group-name">全部项目</span>
              <span class="group-count" id="allCount">0</span>
            </li>
          </ul>
          <button class="add-group-btn" onclick="openAddGroupModal()">+ 新建分组</button>
        </div>
      </div>
    </div>
  </div>

  <div id="importModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">导入项目</h2>
        <button class="modal-close" onclick="closeModal('importModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>项目路径</label>
          <div class="path-row">
            <input type="text" id="importPath" placeholder="例如: /Users/username/projects/my-project">
            <button class="browse-btn" onclick="browseFolderForImport()">浏览...</button>
          </div>
        </div>
        <div class="form-group">
          <label>分组</label>
          <select id="importGroup">
            <option value="默认分组">默认分组</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeModal('importModal')">取消</button>
          <button class="btn btn-primary" onclick="importProject()">导入</button>
        </div>
      </div>
    </div>
  </div>

  <div id="gitImportModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">从 Git 仓库导入</h2>
        <button class="modal-close" onclick="closeGitImportModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>仓库地址 (支持 GitLab / GitHub / 局域网 Git)</label>
          <input type="text" id="gitRepoUrl" placeholder="例如: https://github.com/username/project.git 或 git@gitlab.local:group/project.git">
        </div>
        <div class="form-group">
          <label>保存路径</label>
          <div class="path-row">
            <input type="text" id="gitTargetPath" placeholder="例如: /Users/username/projects">
            <button class="browse-btn" onclick="browseFolderForGitImport()">浏览...</button>
          </div>
        </div>
        <div class="form-group">
          <label>分组</label>
          <select id="gitImportGroup">
            <option value="默认分组">默认分组</option>
          </select>
        </div>
        <div id="gitConflictInfo" style="display: none; background: #fef3c7; border: 1px solid #fcd34d; border-radius: 8px; padding: 12px; margin-bottom: 16px;">
          <div style="font-weight: 500; color: #92400e; margin-bottom: 8px;">⚠️ 项目已存在</div>
          <div style="font-size: 12px; color: #b45309; margin-bottom: 12px;">
            <span id="conflictMessage"></span>
          </div>
          <div style="display: flex; gap: 8px;">
            <button class="btn btn-secondary btn-sm" onclick="setGitAction('skip')">跳过</button>
            <button class="btn btn-danger btn-sm" onclick="setGitAction('overwrite')">覆盖</button>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeGitImportModal()">取消</button>
          <button class="btn btn-primary" id="gitImportBtn" onclick="importFromGit()">导入</button>
        </div>
      </div>
    </div>
  </div>

  <div id="scanModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">批量扫描项目</h2>
        <button class="modal-close" onclick="closeModal('scanModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>扫描目录</label>
          <div class="path-row">
            <input type="text" id="scanPath" placeholder="例如: /Users/username/projects">
            <button class="browse-btn" onclick="browseFolderForScan()">浏览...</button>
          </div>
        </div>
        <div class="form-group">
          <label>分组</label>
          <select id="scanGroup">
            <option value="默认分组">默认分组</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="scanProjects()" style="width: 100%; margin-bottom: 16px;justify-content: center;">开始扫描</button>
        <div id="scanResults" class="scan-results" style="display: none;"></div>
        <div class="form-actions" id="scanActions" style="display: none;">
          <button class="btn btn-secondary" onclick="closeModal('scanModal')">取消</button>
          <button class="btn btn-success" onclick="importScannedProjects()">导入选中</button>
        </div>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">编辑项目</h2>
        <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>项目名称</label>
          <input type="text" id="editName">
        </div>
        <div class="form-group">
          <label>分组</label>
          <select id="editGroup">
            <option value="默认分组">默认分组</option>
          </select>
        </div>
        <div class="form-group">
          <label>端口</label>
          <input type="number" id="editPort" min="1" max="65535">
        </div>
        <div class="form-group">
          <label>Node版本</label>
          <input type="text" id="editNodeVersion" placeholder="例如: >=18.0.0">
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeModal('editModal')">取消</button>
          <button class="btn btn-primary" onclick="saveEdit(event)">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div id="addGroupModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">新建分组</h2>
        <button class="modal-close" onclick="closeModal('addGroupModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>分组名称</label>
          <input type="text" id="newGroupName" placeholder="输入分组名称">
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeModal('addGroupModal')">取消</button>
          <button class="btn btn-primary" onclick="addGroup()">创建</button>
        </div>
      </div>
    </div>
  </div>

  <div id="renameGroupModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">重命名分组</h2>
        <button class="modal-close" onclick="closeModal('renameGroupModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="renameOldName">
        <div class="form-group">
          <label>新分组名称</label>
          <input type="text" id="renameNewName" placeholder="输入新分组名称">
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeModal('renameGroupModal')">取消</button>
          <button class="btn btn-primary" onclick="renameGroup()">确认</button>
        </div>
      </div>
    </div>
  </div>

  <div id="branchModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal" style="max-width: 500px;">
      <div class="modal-header">
        <h2 class="modal-title">切换分支</h2>
        <button class="modal-close" onclick="closeBranchModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>当前分支</label>
          <div id="currentBranchDisplay" style="padding: 10px; background: var(--bg-tertiary); border-radius: 6px; font-weight: 600; color: #16a34a;"></div>
        </div>
        <div class="form-group">
          <label>目标分支</label>
          <select id="branchSelect" data-searchable="true"></select>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeBranchModal()">取消</button>
          <button class="btn btn-primary" id="checkoutBtn" onclick="checkoutBranch()">切换分支</button>
        </div>
      </div>
    </div>
  </div>

  <div id="mergeModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal" style="max-width: 500px;">
      <div class="modal-header">
        <h2 class="modal-title">合并分支</h2>
        <button class="modal-close" onclick="closeMergeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>选择要合并的分支</label>
          <select id="mergeBranchSelect"></select>
        </div>
        <div style="padding: 12px; background: #fef3c7; border-radius: 6px; margin-bottom: 16px; font-size: 13px; color: #92400e;">
          ⚠️ 合并前请确保已提交当前分支的所有更改，如有冲突将自动打开编辑器进行解决
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeMergeModal()">取消</button>
          <button class="btn btn-primary" id="mergeBtn" onclick="executeMerge()">执行合并</button>
        </div>
      </div>
    </div>
  </div>

  <div id="logsModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal" style="max-width: 800px;">
      <div class="modal-header">
        <h2 class="modal-title" id="logsTitle">项目日志</h2>
        <button class="modal-close" onclick="closeModal('logsModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="logsContent" class="logs-container"></div>
        <div class="progress-bar" id="logsProgress" style="display: none;">
          <div class="progress"></div>
        </div>
        <div class="form-actions" style="margin-top: 16px;">
          <button class="btn btn-danger" id="stopProjectBtn" onclick="stopProjectFromLogs()" style="display: none;">停止项目</button>
          <button class="btn btn-secondary" onclick="closeModal('logsModal')">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal" style="max-width: 400px;">
      <div class="modal-header">
        <h2 class="modal-title" id="confirmTitle">确认操作</h2>
        <button class="modal-close" onclick="closeModal('confirmModal')">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirmMessage" style="text-align: left; margin-bottom: 20px;">确定要执行此操作吗？</p>
        <div class="form-actions" style="justify-content: end;">
          <button class="btn btn-secondary" onclick="closeModal('confirmModal')">取消</button>
          <button class="btn btn-danger" id="confirmActionBtn">确认</button>
        </div>
      </div>
    </div>
  </div>

  <div id="packageJsonModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal" style="max-width: 900px;">
      <div class="modal-header">
        <h2 class="modal-title" id="packageJsonTitle">package.json</h2>
        <button class="modal-close" onclick="closeModal('packageJsonModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="packageJsonContent" class="code-display"></div>
        <div class="form-actions" style="margin-top: 16px;">
          <button class="btn btn-secondary" onclick="closeModal('packageJsonModal')">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <div id="wallpaperModal" class="modal-overlay backdrop-blur-sm">
    <div class="modal wallpaper-modal">
      <div class="modal-header">
        <h2 class="modal-title">壁纸库</h2>
        <button class="modal-close" onclick="closeModal('wallpaperModal')">&times;</button>
      </div>
      <div class="modal-body wallpaper-body">
        <div class="wallpaper-sidebar">
          <div class="wallpaper-section active" data-section="wallhaven">Wallhaven</div>
          <div class="wallpaper-section" data-section="solid">纯色背景</div>
          <div class="wallpaper-section" data-section="custom">自定义上传</div>
        </div>
        <div class="wallpaper-content">
          <div class="wallpaper-grid" id="wallpaperGrid">
          </div>
          <div class="wallpaper-grid solid-colors" id="solidColorsGrid" style="display: none;">
            <div class="solid-color-item" style="background: #1a1a2e;" data-color="#1a1a2e"></div>
            <div class="solid-color-item" style="background: #16213e;" data-color="#16213e"></div>
            <div class="solid-color-item" style="background: #0f3460;" data-color="#0f3460"></div>
            <div class="solid-color-item" style="background: #533483;" data-color="#533483"></div>
            <div class="solid-color-item" style="background: #f8f9fa;" data-color="#f8f9fa"></div>
            <div class="solid-color-item" style="background: #e9ecef;" data-color="#e9ecef"></div>
            <div class="solid-color-item" style="background: #dee2e6;" data-color="#dee2e6"></div>
            <div class="solid-color-item" style="background: #ced4da;" data-color="#ced4da"></div>
            <input type="color" class="custom-solid-color" id="customSolidColor" onchange="setCustomSolidColor()">
          </div>
          <div class="wallpaper-upload" id="wallpaperUpload" style="display: none;">
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('uploadInput').click()">
              <span class="upload-icon">📁</span>
              <span class="upload-text">点击或拖拽上传图片</span>
              <input type="file" id="uploadInput" accept="image/*" onchange="handleWallpaperUpload()">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

    <button class="scroll-to-top" id="scrollToTopBtn" onclick="scrollToTop()" title="回到顶部">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>
    <!-- Toast 消息容器 -->
    <div id="toastContainer" class="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
